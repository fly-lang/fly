name: Release

on:
  push:
    branches:
      - main

env:
  WIN_FILE: win-x64.zip
  LINUX_FILE: linux-x86_64.tar.gz

jobs:

  build-linux:
    uses: ./.github/workflows/build-linux.yml

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read Version from CMake
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 'set(FLY_VERSION' CMakeLists.txt | sed 's/[^"]*"\([^"]*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read version from CMakeLists.txt"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact-main
          path: ./linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact-main
          path: ./windows

      - name: Package Linux
        run: |
          cd linux
          tar -czvf ../fly-${{ steps.version.outputs.version }}-${{ env.LINUX_FILE }} *

      - name: Package Windows
        run: |
          cd windows
          zip -r ../fly-${{ steps.version.outputs.version }}-${{ env.WIN_FILE }} *

      - name: Verify artifacts
        run: |
          ls -la fly-*
          [ -f "fly-${{ steps.version.outputs.version }}-${{ env.LINUX_FILE }}" ] || exit 1
          [ -f "fly-${{ steps.version.outputs.version }}-${{ env.WIN_FILE }}" ] || exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          tag_name: v${{ steps.version.outputs.version }}
          name: Fly ${{ steps.version.outputs.version }}
          files: |
            fly-${{ steps.version.outputs.version }}-${{ env.LINUX_FILE }}
            fly-${{ steps.version.outputs.version }}-${{ env.WIN_FILE }}
          body: |
            Fly ${{ steps.version.outputs.version }} Release

            Built and tested on:
            - Linux (Ubuntu)
            - Windows
        env:
          GITHUB_TOKEN: ${{ github.token }}
