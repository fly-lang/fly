name: Release

on:
  workflow_dispatch:

env:
  WIN_FILE: win-x64.zip
  LINUX_FILE: linux-x86_64.tar.gz

jobs:
  get-version:
    uses: ./.github/workflows/get-version.yml

  release:
    needs: get-version
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build-linux.yml
          name: linux-artifact
          path: .
          search_artifacts: true

      # - name: Download Windows artifact
      #   uses: dawidd6/action-download-artifact@v2
      #   with:
      #     workflow: build-windows.yml
      #     name: windows-artifact
      #     path: .
      #     search_artifacts: true

      # Uncomment when build-macos is re-enabled in build.yml
      # - name: Download macOS artifact
      #   uses: dawidd6/action-download-artifact@v2
      #   with:
      #     workflow: build.yml
      #     name: macos-artifact
      #     path: .
      #     search_artifacts: true

      - name: Verify artifacts exist
        run: |
          echo "Version: ${{ env.VERSION }}"
          ls -la fly-*
          [ -f "fly-${{ env.VERSION }}-${{ env.LINUX_FILE }}" ] || exit 1
          #[ -f "fly-${{ env.VERSION }}-${{ env.WIN_FILE }}" ] || exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          tag_name: v${{ env.VERSION }}
          name: Fly ${{ env.VERSION }}
          files: |
            fly-${{ env.VERSION }}-${{ env.LINUX_FILE }}
            fly-${{ env.VERSION }}-${{ env.WIN_FILE }}
            # fly-${{ env.VERSION }}-${{ env.MACOS_FILE }}
          body: |
            Fly ${{ env.VERSION }} Release
            
            Built and tested on:
            - Linux (Ubuntu)
            - Windows
        env:
          GITHUB_TOKEN: ${{ github.token }}
