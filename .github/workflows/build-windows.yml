name: Build Windows

on:
  workflow_call:
    outputs:
      build_info:
        value: ${{ jobs.build-windows.outputs.build_info }}
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  BUILD_DIR: build

jobs:

  build-windows:
    runs-on: windows-latest
    outputs:
      build_info: ${{ steps.info.outputs.build_info }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: choco install ninja -y

      - name: Configure
        run: cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Set Build Type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}
        shell: pwsh
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

      - name: Capture build info
        id: info
        shell: pwsh
        run: |
          $os = (Get-CimInstance Win32_OperatingSystem).Caption
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationVersion
          echo "build_info=$os, MSVC $vs" >> $env:GITHUB_OUTPUT

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=windows-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\bin, dist\lib | Out-Null
          Copy-Item ${{env.BUILD_DIR}}\bin\* dist\bin\ -ErrorAction SilentlyContinue
          # Copy only the std-lib headers and archives, flat into dist\lib.
          # NB: PowerShell's $_.Extension on "clang.fly.h" is ".h", not ".fly.h",
          # so match on the full Name with -like '*.fly.h'. Copying the selected
          # files (not the whole dir) also avoids the build\lib\. → dist\lib\lib
          # nesting gotcha.
          Get-ChildItem ${{env.BUILD_DIR}}\lib -Recurse -File |
            Where-Object { $_.Name -like '*.fly.h' -or $_.Name -eq 'fly_std_lib.lib' -or $_.Name -eq 'fly_runtime_lib.lib' } |
            Copy-Item -Destination dist\lib\ -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
          overwrite: true
