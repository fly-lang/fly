name: Build Windows

# ─────────────────────────────────────────────────────────────────────────────
# TEMPORARILY DISABLED — the self-host compiler is only validated on Linux for
# now. Auto-triggers are removed (manual workflow_dispatch only) and the job is
# gated behind `if: false` so it never executes. Re-enable by restoring the
# push/workflow_call triggers and removing the `if: false` guard once the
# Windows toolchain path is ported.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

env:
  FLY_VERSION: "0.13.5"

jobs:

  build-windows:
    if: false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: choco install llvm --version=20.1.8 -y

      - name: Download fly binary
        shell: pwsh
        run: |
          $url = "https://github.com/fly-lang/fly/releases/download/v$env:FLY_VERSION/fly-$env:FLY_VERSION-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile fly.zip
          Expand-Archive fly.zip -DestinationPath fly-bin
          Copy-Item fly-bin\fly.exe -Destination "$env:SystemRoot\system32\fly.exe"
          fly --version

      - name: Download flyp binary
        shell: pwsh
        run: |
          $url = "https://github.com/fly-lang/fly/releases/download/v$env:FLY_VERSION/flyp-$env:FLY_VERSION-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile flyp.zip
          Expand-Archive flyp.zip -DestinationPath flyp-bin
          Copy-Item flyp-bin\flyp.exe -Destination "$env:SystemRoot\system32\flyp.exe"
          flyp --version

      - name: Set build type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "FLYP_PROFILE=--release" >> $GITHUB_ENV

      - name: Build
        run: flyp build ${{ env.FLYP_PROFILE }}

      - name: Test
        run: flyp test ${{ env.FLYP_PROFILE }}

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=windows-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: build\bin\fly.exe
          overwrite: true
