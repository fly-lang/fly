name: Get Version

on:
  workflow_call:
    outputs:
      version:
        description: "The project version read from CMake"
        value: ${{ jobs.read-version.outputs.version }}

env:
  BUILD_DIR: build

jobs:
  read-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -E make_directory ${{ env.BUILD_DIR }}
          cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=Release

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION=$(cmake -LA -N ${{ env.BUILD_DIR }} | grep '^FLY_VERSION:STRING=' | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read version from CMake"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

