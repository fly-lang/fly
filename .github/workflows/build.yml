name: Build

# Triggers the workflow on every push
on:
  push:

env:
  # CMake build type (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  BUILD_DIR: build
  WIN_FILE: win-x64.zip
  MACOS_FILE: macos-x86_64.tar.gz
  LINUX_FILE: linux-x86_64.tar.gz

jobs:

  build-linux:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: sudo apt update && sudo apt-get -y install binutils-dev libdw-dev libdwarf-dev libzstd-dev gdb

      - name: Configure
        run: cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Set Build Type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/test
        run: |
          ./fly_test
          ./fly_lib_test
          ./fly_runtime_test

      - name: Backtrace on Crash
        if: failure()
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/test
        run: |
          gdb -batch \
              -ex "set pagination off" \
              -ex "handle SIGSEGV stop nopass" \
              -ex "run --gtest_catch_exceptions=0" \
              -ex "bt full" \
              -ex "quit" \
              --args ./fly_test

      - name: Read Version
        id: version
        if: github.ref == 'refs/heads/main'
        run: echo "version=$(${{github.workspace}}/${{env.BUILD_DIR}}/compiler/fly --version-short)" >> $GITHUB_OUTPUT

      - name: Packaging
        if: github.ref == 'refs/heads/main'
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/compiler
        run: tar -czvf ../fly-${{ steps.version.outputs.version }}-${{env.LINUX_FILE}} fly

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: linux-artifact
          path: ${{github.workspace}}/${{env.BUILD_DIR}}/fly-${{ steps.version.outputs.version }}-${{env.LINUX_FILE}}

  build-windows:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: vcpkg install zstd:x64-windows

      - name: Configure
        run: cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Set Build Type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}
        shell: pwsh
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}\test\${{env.BUILD_TYPE}}
        run: |
          .\fly_test.exe --gtest_filter='-CmdTest.EmitOut'
          .\fly_lib_test.exe
          .\fly_runtime_test.exe

      - name: Read Version
        id: version
        if: github.ref == 'refs/heads/main'
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}\compiler\${{env.BUILD_TYPE}}
        run: echo "version=$(.\fly.exe --version-short)" >> $env:GITHUB_OUTPUT

      - name: Packaging
        if: github.ref == 'refs/heads/main'
        working-directory: ${{github.workspace}}\${{env.BUILD_DIR}}\compiler\${{env.BUILD_TYPE}}
        run: 7z a ..\..\fly-${{ steps.version.outputs.version }}-${{env.WIN_FILE}} fly.exe

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: windows-artifact
          path: ${{github.workspace}}/${{env.BUILD_DIR}}/fly-${{ steps.version.outputs.version }}-${{env.WIN_FILE}}

  # macOS build is currently disabled (not yet supported).
  # To re-enable: uncomment this job, add macos-artifact to the release job's
  # download steps and files list, and add macos to release needs.
  #
  # build-macos:
