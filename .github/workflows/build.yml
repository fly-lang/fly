  #
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Configure
  #       run: cmake -E make_directory ${{env.BUILD_DIR}}
  #
  #     - name: Set Build Type
  #       shell: bash
  #       if: startsWith(github.ref, 'refs/heads/release/')
  #       run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV
  #
  #     - name: Build
  #       working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
  #       run: |
  #         cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON
  #         cmake --build . --config ${{env.BUILD_TYPE}}
  #
  #     - name: Test
  #       working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/test
  #       run: |
  #         ./fly_test
  #         ./fly_lib_test
  #         ./fly_runtime_test
  #
  #     - name: Read Version
  #       id: version
  #       if: github.ref == 'refs/heads/main'
  #       run: echo "version=$(${{github.workspace}}/${{env.BUILD_DIR}}/compiler/fly --version-short)" >> $GITHUB_OUTPUT
  #
  #     - name: Packaging
  #       if: github.ref == 'refs/heads/main'
  #       working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/compiler
  #       run: tar -czvf ../fly-${{ steps.version.outputs.version }}-${{env.MACOS_FILE}} fly
  #
  #     - uses: actions/upload-artifact@v4
  #       if: github.ref == 'refs/heads/main'
  #       with:
  #         name: macos-artifact
  #         path: ${{github.workspace}}/${{env.BUILD_DIR}}/fly-${{ steps.version.outputs.version }}-${{env.MACOS_FILE}}

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: .

      # Uncomment when build-macos is re-enabled
      # - uses: actions/download-artifact@v4
      #   with:
      #     name: macos-artifact
      #     path: .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          name: Fly ${{ needs.build-linux.outputs.version }}
          tag_name: v${{ needs.build-linux.outputs.version }}
          files: |
            fly-${{ needs.build-linux.outputs.version }}-${{ env.LINUX_FILE }}
            fly-${{ needs.build-windows.outputs.version }}-${{ env.WIN_FILE }}
            # fly-${{ needs.build-macos.outputs.version }}-${{ env.MACOS_FILE }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
