name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  FLY_VERSION: "0.13.5"

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libllvm20 lld-20 clang-20

      - name: Download fly binary
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/fly-lang/fly/releases/download/v${FLY_VERSION}/fly-${FLY_VERSION}-linux-x86_64.tar.gz" \
            -o fly.tar.gz
          mkdir -p fly-bin
          tar -xzf fly.tar.gz -C fly-bin
          # The binary may be at the tarball root or nested (e.g. build/bin/fly),
          # so locate it rather than assuming a fixed path.
          FLY_BIN="$(find fly-bin -type f -name fly | head -1)"
          if [ -z "$FLY_BIN" ]; then
            echo "error: 'fly' binary not found in tarball; contents:"
            tar -tzf fly.tar.gz
            exit 1
          fi
          chmod +x "$FLY_BIN"
          sudo mv "$FLY_BIN" /usr/local/bin/fly
          fly --version

      - name: Build self-host compiler
        run: FLY=fly ./build_compiler.sh

      - name: Test self-host compiler
        run: FLY=fly ./test_compiler.sh

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: build/bin/fly
          overwrite: true
