name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  FLY_VERSION: "0.13.5"

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libllvm20 lld-20 clang-20

      - name: Download fly binary
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/fly-lang/fly/releases/download/v${FLY_VERSION}/fly-${FLY_VERSION}-linux-x86_64.tar.gz" \
            -o fly.tar.gz
          mkdir -p fly
          tar -xzf fly.tar.gz -C fly
          FLY_BIN="fly/bin/fly"
          chmod +x "$FLY_BIN"
          echo "$(pwd)/fly/bin" >> "$GITHUB_PATH"
          fly --version

      - name: Build self-host compiler
        run: fly ./build_compiler.sh

      - name: Test self-host compiler
        run: fly ./test_compiler.sh

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: build/linux
          overwrite: true
