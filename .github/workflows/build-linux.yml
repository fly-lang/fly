name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  # Bootstrap compiler release. Bump to the first release that ships the
  # executable-path stdlib resolution fix (fly Driver.cpp getMainExecutable);
  # until then the absolute $FLY below keeps older releases working in CI.
  FLY_VERSION: "0.13.7"

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libllvm20 lld-20 clang-20

      - name: Download fly binary
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/fly-lang/fly/releases/download/v${FLY_VERSION}/fly-${FLY_VERSION}-linux-x86_64.tar.gz" \
            -o fly.tar.gz
          mkdir -p fly
          tar -xzf fly.tar.gz -C fly
          FLY_BIN="$(pwd)/fly/bin/fly"
          chmod +x "$FLY_BIN"
          # Use an absolute path (not a bare `fly` on PATH): released compilers
          # derive their stdlib dir from the executable path, and a bare name
          # resolved from a cwd containing this `fly/` directory breaks that
          # lookup. The build/test scripts honour $FLY.
          echo "FLY=$FLY_BIN" >> "$GITHUB_ENV"
          echo "$(pwd)/fly/bin" >> "$GITHUB_PATH"

      - name: Build self-host compiler
        run: chmod +x ./build_compiler.sh && ./build_compiler.sh

      - name: Test self-host compiler
        run: chmod +x ./test_compiler.sh && ./test_compiler.sh

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: build/linux
          overwrite: true
