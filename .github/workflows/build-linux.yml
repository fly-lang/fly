name: Build Linux

on:
  workflow_call:
    outputs:
      build_info:
        value: ${{ jobs.build-linux.outputs.build_info }}
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  BUILD_DIR: build

jobs:

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      build_info: ${{ steps.info.outputs.build_info }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt update && sudo apt-get -y install binutils-dev libdw-dev libdwarf-dev libzstd-dev gdb

      - name: Configure
        run: cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Set Build Type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        run: ctest --output-on-failure

      - name: Backtrace on Crash
        if: failure()
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/test
        run: |
          gdb -batch \
              -ex "set pagination off" \
              -ex "handle SIGSEGV stop nopass" \
              -ex "run --gtest_catch_exceptions=0" \
              -ex "bt full" \
              -ex "quit" \
              --args ./fly_test

      - name: Capture build info
        id: info
        run: |
          OS=$(lsb_release -ds)
          CC=$(cc --version | head -1)
          echo "build_info=${OS}, ${CC}" >> $GITHUB_OUTPUT

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - name: Stage release artifacts
        run: |
          mkdir -p dist/bin dist/lib
          cp ${{env.BUILD_DIR}}/bin/* dist/bin/ 2>/dev/null || true
          cp -r ${{env.BUILD_DIR}}/lib/. dist/lib/
          find dist/lib -type f ! \( -name "*.fly.h" -o -name "fly_std_lib.a" -o -name "fly_runtime_lib.a" \) -delete

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: dist/
          overwrite: true
