name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  # Bootstrap compiler release. Must ship the ptrsize header-gen fix (fly
  # Frontend.cpp typeStr) so the `--lib` std build emits a valid mem.fly.h;
  # older releases drop the ptrsize type and produce a header that crashes on load.
  FLY_VERSION: "0.13.7"

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install LLVM 20 (apt) + the bootstrap fly compiler ($FLY / PATH). Single
      # source of truth shared with local builds: it self-skips work already done
      # and wires up the env via $GITHUB_ENV/$GITHUB_PATH in CI. Run it locally to
      # reproduce this.
      - name: Install prerequisites (LLVM + fly)
        run: chmod +x ./ci/linux/install_prerequisites.sh && ./ci/linux/install_prerequisites.sh

      - name: Build self-host compiler
        run: chmod +x ./ci/linux/build_compiler.sh && ./ci/linux/build_compiler.sh

      - name: Test self-host compiler
        run: chmod +x ./ci/linux/test_compiler.sh && ./ci/linux/test_compiler.sh

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          # Both dirs: the artifact root is their common ancestor (build/), so it
          # preserves the bin/ + lib/ layout the release archive needs.
          path: |
            build/bin
            build/lib
          if-no-files-found: error
          overwrite: true
