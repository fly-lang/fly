name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  BUILD_DIR: build

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt update && sudo apt-get -y install binutils-dev libdw-dev libdwarf-dev libzstd-dev gdb

      - name: Configure
        run: cmake -E make_directory ${{env.BUILD_DIR}}

      - name: Set Build Type
        shell: bash
        if: startsWith(github.ref, 'refs/heads/release/')
        run: echo "BUILD_TYPE=RelWithDebInfo" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        run: |
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}
        run: ctest --output-on-failure

      - name: Backtrace on Crash
        if: failure()
        working-directory: ${{github.workspace}}/${{env.BUILD_DIR}}/test
        run: |
          gdb -batch \
              -ex "set pagination off" \
              -ex "handle SIGSEGV stop nopass" \
              -ex "run --gtest_catch_exceptions=0" \
              -ex "bt full" \
              -ex "quit" \
              --args ./fly_test

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: |
            ${{github.workspace}}/${{env.BUILD_DIR}}/bin/*
            ${{github.workspace}}/${{env.BUILD_DIR}}/lib/**/*.fly.h
            ${{github.workspace}}/${{env.BUILD_DIR}}/lib/*.fly.h
            ${{github.workspace}}/${{env.BUILD_DIR}}/lib/fly_std_lib.a
          overwrite: true
