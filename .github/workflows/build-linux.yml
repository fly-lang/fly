name: Build Linux

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
    branches:
      - release/*
  workflow_dispatch:

env:
  # Bootstrap compiler release. Bump to the first release that ships the
  # executable-path stdlib resolution fix (fly Driver.cpp getMainExecutable);
  # until then the absolute $FLY below keeps older releases working in CI.
  FLY_VERSION: "0.13.7"

jobs:

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install LLVM 20 (apt) + the bootstrap fly compiler ($FLY / PATH). Single
      # source of truth shared with local builds: it self-skips work already done
      # and wires up the env via $GITHUB_ENV/$GITHUB_PATH in CI. Run it locally to
      # reproduce this.
      - name: Install prerequisites (LLVM + fly)
        run: chmod +x ./ci/linux/install_prerequisites.sh && ./ci/linux/install_prerequisites.sh

      - name: Build self-host compiler
        run: chmod +x ./ci/linux/build_compiler.sh && ./ci/linux/build_compiler.sh

      - name: Test self-host compiler
        run: chmod +x ./ci/linux/test_compiler.sh && ./ci/linux/test_compiler.sh

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "artifact_name=linux-artifact-${BRANCH//\//-}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: build/linux
          overwrite: true
